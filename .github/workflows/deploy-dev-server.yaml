name: CI/CD InfinityFree (FTP)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
    - name: 1. Mengambil Kode dari Repository
      uses: actions/checkout@v3

    - name: 2. Setup PHP 8.1
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: 3. Install Dependencies (Membentuk folder vendor)
      run: composer install --no-dev --optimize-autoloader

    - name: 4. Upload ke InfinityFree via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Jika file utama ada di dalam folder public CI4, kita arahkan ke htdocs
        server-dir: /htdocs/
        # Mengecualikan file yang tidak perlu diupload
        exclude: |
          **/.git*
          **/.git*/**
          **/tests/**
          README.md